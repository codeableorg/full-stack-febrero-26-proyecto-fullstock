      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;

          type="password"
          placeholder="******"
          required

      <label for="country">Pais de nacimiento:</label>
      <select name="country" id="country">
        <option value="">Selecciona uno</option>
        <optgroup label="Sudamérica">
          <option value="AR">Argentina</option>
