      section {

      .boxes {
        display: flex;
        gap: 32px;

      .box {
        width: 75px;
        height: 75px;
        background-color: DarkSeaGreen;
        display: grid;
        place-items: center;
      }

      .transform {
        background-color: hsla(171, 84%, 48%, 0.67);
      }

      .natural-pos {
        border: 2px dashed DarkBlue;
      }

      .translate .transform {
        /* Activar una a la vez */
        transform: translate(100px, 100px);
        /* transform: translateX(-20px); */

        <div class="natural-pos"><div class="box">Caja 3</div></div>
      </div>
